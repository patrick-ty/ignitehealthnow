steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=NEXT_PUBLIC_API_URL=${_API}
      - --build-arg=NEXT_PUBLIC_SUPABASE_URL=${_SUPA_URL}
      - --build-arg=NEXT_PUBLIC_SUPABASE_ANON_KEY=${_SUPA_ANON}
      - -t=us-central1-docker.pkg.dev/ignitehealthnow-2025/ignitehealth/ignitehealth-admin:latest
      - .
images:
  - us-central1-docker.pkg.dev/ignitehealthnow-2025/ignitehealth/ignitehealth-admin:latest
