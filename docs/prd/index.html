<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IgniteHealthNow PRD</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a2e;
      --heading: #0f0f23;
      --accent: #e8530e;
      --border: #e2e8f0;
      --code-bg: #f1f5f9;
      --table-stripe: #f8fafc;
      --link: #2563eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #e2e8f0;
        --heading: #f1f5f9;
        --accent: #f97316;
        --border: #334155;
        --code-bg: #1e293b;
        --table-stripe: #1e293b;
        --link: #60a5fa;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      padding: 2rem 1rem;
      max-width: 960px;
      margin: 0 auto;
    }
    h1 { font-size: 2.2rem; color: var(--accent); margin: 2rem 0 1rem; border-bottom: 3px solid var(--accent); padding-bottom: 0.5rem; }
    h2 { font-size: 1.6rem; color: var(--heading); margin: 2.5rem 0 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    h3 { font-size: 1.25rem; color: var(--heading); margin: 1.8rem 0 0.6rem; }
    h4 { font-size: 1.05rem; color: var(--heading); margin: 1.4rem 0 0.5rem; }
    p { margin: 0.6rem 0; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    ul, ol { padding-left: 1.8rem; margin: 0.5rem 0; }
    li { margin: 0.3rem 0; }
    strong { color: var(--heading); }
    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    code {
      background: var(--code-bg);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }
    pre { background: var(--code-bg); padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1rem 0; }
    pre code { background: none; padding: 0; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.92rem;
      display: block;
      overflow-x: auto;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
      vertical-align: top;
    }
    th { background: var(--code-bg); font-weight: 600; color: var(--heading); white-space: nowrap; }
    tr:nth-child(even) { background: var(--table-stripe); }
    blockquote {
      border-left: 4px solid var(--accent);
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      background: var(--code-bg);
      border-radius: 0 6px 6px 0;
    }
    /* TOC styling */
    #content > ol:first-of-type,
    #content > ul:first-of-type {
      background: var(--code-bg);
      padding: 1.2rem 1.2rem 1.2rem 2.5rem;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    /* Floating TOC button */
    .toc-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .toc-btn:hover { transform: scale(1.1); }
    /* Loading state */
    .loading {
      text-align: center;
      padding: 4rem 0;
      color: var(--accent);
      font-size: 1.2rem;
    }
    .loading::after {
      content: '';
      display: block;
      width: 40px;
      height: 40px;
      margin: 1rem auto;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="content" class="loading">Loading PRD...</div>
  <button class="toc-btn" onclick="window.scrollTo({top:0})" title="Back to top">&#8593;</button>
  <script>
    async function loadPRD() {
      try {
        const res = await fetch('./ignitehealth-prd.md?t=' + Date.now());
        const md = await res.text();
        document.getElementById('content').className = '';
        document.getElementById('content').innerHTML = marked.parse(md);
      } catch(e) {
        document.getElementById('content').innerHTML = '<p style="color:red">Failed to load PRD: ' + e.message + '</p>';
      }
    }
    loadPRD();
  </script>
</body>
</html>
